# This file defines all third-party Rust dependencies approved for use
# in Node.js.

[package]
edition = "2021"
name = "node_crates"
version = "0.2.3"
rust-version = "1.86"

[lib]
crate-type = ["staticlib"]

[dependencies.icu_casemap]
version = "2.2.0"
default-features = false
features = ["compiled_data"]

[dependencies.icu_experimental]
version = "0.5.0"
default-features = false
features = ["compiled_data"]

[dependencies.icu_locale_core]
version = "2.2.0"
default-features = false

[dependencies.icu_normalizer]
version = "2.2.0"
default-features = false
features = ["compiled_data"]

[dependencies.icu_properties]
version = "2.2.0"
default-features = false
features = ["compiled_data"]

[dependencies.icu_provider]
version = "2.2.0"
default-features = false

[dependencies.temporal_capi]
version = "0.2.3"
features = ["zoneinfo64"]

[dependencies.temporal_rs]
version = "0.2.3"
default-features = false
# This is necessary to enable a spec-compliance quirk
features = ["float64_representable_durations"]
