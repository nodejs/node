name: First commit message adheres to guidelines

on:
  pull_request:
    branches:
      - main
      - v[0-9]+.x-staging

env:
  NODE_VERSION: lts/*

permissions:
  contents: read

jobs:
  lint-commit-message:
    if: |
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      github.event.pull_request.user.login != 'Copilot'
    runs-on: ubuntu-latest
    steps:
      - name: Compute number of commits in the PR
        id: nb-of-commits
        run: |
          echo "plusOne=$((${{ github.event.pull_request.commits }} + 1))" >> $GITHUB_OUTPUT
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: ${{ steps.nb-of-commits.outputs.plusOne }}
          persist-credentials: false
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Validate commit message
        run: |
          echo "::add-matcher::.github/workflows/commit-lint-problem-matcher.json"
          base_sha=$(git rev-parse HEAD^1)
          git reset HEAD^2
          first_commit=""
          while IFS= read -r sha; do
            title=$(git show -s --format=%s "$sha")
            if [ "$title" != "Initial plan" ]; then
              first_commit="$sha"
              break
            fi
          done < <(git log --no-merges --reverse --format="%H" "${base_sha}..HEAD")
          if [ -z "$first_commit" ]; then
            echo "ERROR: Could not find a commit to validate (all commits are titled 'Initial plan')."
            exit 1
          fi
          npx -q core-validate-commit --no-validate-metadata --tap "$first_commit"
