name: First commit message adheres to guidelines

on:
  pull_request:
    branches:
      - main
      - v[0-9]+.x-staging

env:
  NODE_VERSION: lts/*

permissions:
  contents: read

jobs:
  lint-commit-message:
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Compute number of commits in the PR
        id: nb-of-commits
        run: |
          echo "plusOne=$((${{ github.event.pull_request.commits }} + 1))" >> $GITHUB_OUTPUT
          echo "minusOne=$((${{ github.event.pull_request.commits }} - 1))" >> $GITHUB_OUTPUT
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: ${{ steps.nb-of-commits.outputs.plusOne }}
          persist-credentials: false
      - run: git reset HEAD^2
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Validate commit message
        run: |
          echo "::add-matcher::.github/workflows/commit-lint-problem-matcher.json"
          minus_one=${{ steps.nb-of-commits.outputs.minusOne }}
          first_commit="$(git rev-parse HEAD~${minus_one})"
          first_title="$(git show -s --format=%s "${first_commit}")"

          if [ "${first_title}" = "Initial plan" ] && [ "${minus_one}" -gt 0 ]; then
            first_commit="$(git rev-parse HEAD~$((minus_one - 1)))"
          fi

          echo "${first_commit}" | xargs npx -q core-validate-commit --no-validate-metadata --tap
